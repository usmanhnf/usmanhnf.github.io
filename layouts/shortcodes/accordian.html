<div class="accordion-container" style="border-top:1px solid #ccc; border-bottom:1px solid #ccc; max-width:600px; margin:0 auto;">
  {{ range .Params.items }}
  <div class="accordion-item" style="border-bottom:1px solid #eee;">
    <button class="accordion-header" style="background:none; border:none; width:100%; text-align:left; padding:10px; cursor:pointer; font-weight:bold;">
      {{ .title }}
    </button>
    <div class="accordion-content" style="display:none; padding:10px;">
      {{ .content | markdownify }}
    </div>
  </div>
  {{ end }}
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const headers = document.querySelectorAll(".accordion-header");
  headers.forEach(header => {
    header.addEventListener("click", function() {
      const content = this.nextElementSibling;
      content.style.display = (content.style.display === "block") ? "none" : "block";
    });
  });
});
</script>
